<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="GOTL 是一个轻量、快速的在线 Go 开发工具箱。">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f4f7f8">
  <title>GOTL · Online Go Tools</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon-180.png">
  <script src="/assets/theme.js"></script>
  <script src="/assets/i18n.js"></script>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="/assets/vendor/json-to-go.js" defer></script>
  <script src="/assets/syntax-highlight.js" defer></script>
  <script src="/assets/json-format.js" defer></script>
  <script src="/assets/app.js" defer></script>
</head>
<body>
  <a id="skip-link" class="skip-link" href="#main-content">跳到主要内容</a>
  <header class="site-header">
    <div class="header-inner">
      <a id="brand-link" class="brand" href="/" aria-label="返回 GOTL 首页">
        <img class="brand-mark" src="/assets/gotl-icon-128.png" width="38" height="38" alt="">
        <span class="brand-copy">
          <strong>GOTL</strong>
          <small>Online Go Tools</small>
        </span>
      </a>
      <div class="header-actions">
        <span id="header-tool-count" class="header-tool-count">8 个工具</span>
        <a id="header-github-link" class="header-action-link" href="https://github.com/pigjin/gotl" target="_blank" rel="noopener noreferrer" aria-label="在 GitHub 查看 pigjin/gotl 项目">
          <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true" fill="currentColor">
            <path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.87c-2.78.61-3.37-1.18-3.37-1.18-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.9 1.53 2.35 1.09 2.92.83.09-.65.35-1.09.64-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.58 9.58 0 0 1 12 6.82c.85 0 1.71.11 2.51.34 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.86v2.76c0 .27.18.58.69.48A10 10 0 0 0 12 2Z"></path>
          </svg>
          <span class="header-action-label">GitHub</span>
        </a>
        <div id="settings-control" class="settings-control">
          <button id="settings-toggle" class="settings-toggle" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="settings-menu">
            <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7h10M18 7h2M4 17h2M10 17h10M14 4v6M6 14v6"></path>
            </svg>
            <span id="settings-toggle-label" class="header-action-label">设置</span>
          </button>
          <div id="settings-menu" class="settings-menu" role="dialog" aria-modal="false" aria-labelledby="settings-title" hidden>
            <div class="settings-menu-header">
              <strong id="settings-title">外观与语言</strong>
            </div>
            <fieldset class="settings-group">
              <legend id="language-legend">语言</legend>
              <div class="settings-options">
                <label class="settings-option">
                  <input type="radio" name="language-preference" value="system">
                  <span id="language-system-label">跟随浏览器</span>
                </label>
                <label class="settings-option">
                  <input type="radio" name="language-preference" value="zh-CN">
                  <span id="language-zh-label">简体中文</span>
                </label>
                <label class="settings-option">
                  <input type="radio" name="language-preference" value="en">
                  <span id="language-en-label">English</span>
                </label>
              </div>
            </fieldset>
            <fieldset class="settings-group">
              <legend id="theme-legend">主题</legend>
              <div class="settings-options">
                <label class="settings-option">
                  <input type="radio" name="theme-preference" value="system">
                  <span id="theme-system-label">跟随系统</span>
                </label>
                <label class="settings-option">
                  <input type="radio" name="theme-preference" value="light">
                  <span id="theme-light-label">浅色</span>
                </label>
                <label class="settings-option">
                  <input type="radio" name="theme-preference" value="dark">
                  <span id="theme-dark-label">深色</span>
                </label>
              </div>
            </fieldset>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div id="app"></div>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <noscript>
    <div class="noscript">GOTL 需要启用 JavaScript 才能使用转换工具。JavaScript is required to use GOTL.</div>
  </noscript>
</body>
</html>
