<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="GOTL 是一个轻量、快速的在线 Go 开发工具箱。">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f4f7f8">
  <title>GOTL · Online Go Tools</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon-180.png">
  <script src="/assets/theme.js"></script>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="/assets/vendor/json-to-go.js" defer></script>
  <script src="/assets/syntax-highlight.js" defer></script>
  <script src="/assets/json-format.js" defer></script>
  <script src="/assets/app.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/" aria-label="返回 GOTL 首页">
        <img class="brand-mark" src="/assets/gotl-icon-128.png" width="38" height="38" alt="">
        <span class="brand-copy">
          <strong>GOTL</strong>
          <small>Online Go Tools</small>
        </span>
      </a>
      <div class="header-actions">
        <div class="header-meta" aria-label="站点状态">
          <span class="status-dot" aria-hidden="true"></span>
          <span>本地运行</span>
          <span class="header-divider" aria-hidden="true"></span>
          <span>8 个工具</span>
        </div>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换为深色模式" aria-pressed="false">
          <span class="theme-toggle-icons" aria-hidden="true">
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <circle cx="12" cy="12" r="3.5"></circle>
              <path d="M12 2.5v2M12 19.5v2M4.6 4.6 6 6M18 18l1.4 1.4M2.5 12h2M19.5 12h2M4.6 19.4 6 18M18 6l1.4-1.4"></path>
            </svg>
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.2 15.2A8.5 8.5 0 0 1 8.8 3.8a8.5 8.5 0 1 0 11.4 11.4Z"></path>
            </svg>
          </span>
          <span id="theme-toggle-label" class="theme-toggle-label">浅色</span>
        </button>
      </div>
    </div>
  </header>

  <div id="app"></div>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <noscript>
    <div class="noscript">GOTL 需要启用 JavaScript 才能使用转换工具。</div>
  </noscript>
</body>
</html>
